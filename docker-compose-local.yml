services:
  ######################################################################################## ours
  ebpp:
    extends:
      file: common-services.yml
      service: ebpp
    depends_on:
      electrs:
        condition: service_started
    environment:
      - EBPP_MNEMONIC=abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about

  key-service:
    extends:
      file: common-services.yml
      service: key-service

  swap-service:
    extends:
      file: common-services.yml
      service: swap-service

  treasury-service:
    extends:
      file: common-services.yml
      service: treasury-service

  quote-service:
    extends:
      file: common-services.yml
      service: quote-service

  wallet-aggregator:
    extends:
      file: common-services.yml
      service: wallet-aggregator

  admin-aggregator:
    extends:
      file: common-services.yml
      service: admin-aggregator

  ebill-service:
    extends:
      file: common-services.yml
      service: ebill-service

  ######################################################################################## 3rd parties
  keycloak:
    extends:
      file: common-services.yml
      service: keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      WDC_DASHBOARD_URL: http://localhost:5173
      KEYCLOAK_BFF_DASHBOARD_SECRET: cute-kitties
      KEYCLOAK_BFF_DASHBOARD_ALLOWED_ORIGINS: "*"
      KEYCLOAK_BFF_DASHBOARD_ALLOWED_REDIRECT_URIS: "*"
      KC_DB: dev-file
    command:
      - start-dev
      - --import-realm
      - --http-port=8080
      - --proxy-headers=xforwarded
      - --hostname=localhost
    ports:
      - "8000:8000"

  surrealdb:
    extends:
      file: common-services.yml
      service: surrealdb

  bitcoin-core:
    extends:
      file: common-services.yml
      service: bitcoin-core
    command:
      - -printtoconsole
      - --regtest=1
      - -conf=/home/bitcoin/bitcoin.conf
    healthcheck:
      test: ["CMD", "bitcoin-cli", "--regtest", "getconnectioncount"]

  electrs:
    extends:
      file: common-services.yml
      service: electrs
    environment:
      ELECTRS_NETWORK: regtest
      ELECTRS_DAEMON_RPC_ADDR: bitcoin-core:18443
      ELECTRS_DAEMON_P2P_ADDR: bitcoin-core:18444

  cdk-mintd:
    extends:
      file: common-services.yml
      service: cdk-mintd

  bff-dashboard-service:
    extends:
      file: common-services.yml
      service: bff-dashboard-service
    ports:
      - "4242:4242"

  bff-wallet-service:
    extends:
      file: common-services.yml
      service: bff-wallet-service
    ports:
      - "4343:4242"

  signatory:
    extends:
      file: common-services.yml
      service: signatory

  nats:
    extends:
      file: common-services.yml
      service: nats

  clowder-node:
    extends:
      file: common-services.yml
      service: clowder-node
    depends_on:
      signatory:
        condition: service_started
      nats:
        condition: service_started
      electrs:
        condition: service_started

  eic-service:
    extends:
      file: common-services.yml
      service: eic-service

  ens-service:
    extends:
      file: common-services.yml
      service: ens-service
