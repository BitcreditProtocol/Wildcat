services:
  ######################################################################################## ours
  ebpp:
    extends:
      file: common-services.yml
      service: ebpp
    depends_on:
      surrealdb:
        condition: service_healthy
    environment:
      - EBPP_MNEMONIC=abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about
      - EBPP__APPCFG__ONCHAIN__NETWORK=testnet
      - EBPP__APPCFG__ONCHAIN__STORE_PATH=/data/testnet
    pull_policy: never

  key-service:
    extends:
      file: common-services.yml
      service: key-service
    pull_policy: never

  swap-service:
    extends:
      file: common-services.yml
      service: swap-service
    pull_policy: never

  treasury-service:
    extends:
      file: common-services.yml
      service: treasury-service
    pull_policy: never

  quote-service:
    extends:
      file: common-services.yml
      service: quote-service
    pull_policy: never

  wallet-aggregator:
    extends:
      file: common-services.yml
      service: wallet-aggregator
    pull_policy: never

  admin-aggregator:
    extends:
      file: common-services.yml
      service: admin-aggregator
    pull_policy: never

  ######################################################################################## 3rd parties

  keycloak:
    extends:
      file: common-services.yml
      service: keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_SECRET}
      WDC_DASHBOARD_URL: ${WDC_DASHBOARD_URL}
      KEYCLOAK_BFF_DASHBOARD_SECRET: ${KEYCLOAK_BFF_DASHBOARD_SECRET}
      KEYCLOAK_BFF_DASHBOARD_ALLOWED_ORIGINS: ${KEYCLOAK_BFF_DASHBOARD_ALLOWED_ORIGINS}
      KEYCLOAK_BFF_DASHBOARD_ALLOWED_REDIRECT_URIS: ${KEYCLOAK_BFF_DASHBOARD_ALLOWED_REDIRECT_URIS}
      KC_DB: dev-file
    command:
      - start-dev
      - --import-realm
      - --http-port=8080
      - --proxy-headers=xforwarded
      - --hostname=${KEYCLOAK_HOSTNAME}
    ports:
      - "8080:8080"

  surrealdb:
    extends:
      file: common-services.yml
      service: surrealdb

  cdk-mintd:
    extends:
      file: common-services.yml
      service: cdk-mintd

  bff-dashboard-service:
    extends:
      file: common-services.yml
      service: bff-dashboard-service
    ports:
      - "4242:4242"

  bff-wallet-service:
    extends:
      file: common-services.yml
      service: bff-wallet-service
    ports:
      - "4343:4242"

  nats:
    extends:
      file: common-services.yml
      service: nats

  nats-beta:
    extends:
      file: common-services.yml
      service: nats

  ######################################################################################## wildcat-auxiliary

  ebill-service:
    extends:
      file: common-services.yml
      service: ebill-service

  eic-service:
    extends:
      file: common-services.yml
      service: eic-service

  ens-service:
    extends:
      file: common-services.yml
      service: ens-service

  ######################################################################################## clowder

  signatory:
    extends:
      file: common-services.yml
      service: signatory
    volumes:
      - ./docker/clowder-signatory/settings.toml:/clowder/settings.toml

  signatory-beta:
    extends:
      file: common-services.yml
      service: signatory
    volumes:
      - ./docker/clowder-signatory/settings_beta.toml:/clowder/settings.toml
    depends_on:
      nats-beta:
        condition: service_started

  clowder-node:
    extends:
      file: common-services.yml
      service: clowder-node
    depends_on:
      signatory:
        condition: service_started
      nats:
        condition: service_started
    volumes:
      - ./docker/clowder-node/settings.toml:/clowder/settings.toml
    ports:
      - "3010:3010"
      - 5001:5001/udp

  clowder-beta:
    extends:
      file: common-services.yml
      service: clowder-node
    depends_on:
      signatory-beta:
        condition: service_started
      nats-beta:
        condition: service_started
    volumes:
      - ./docker/clowder-node/settings_beta.toml:/clowder/settings.toml
    ports:
      - "3011:3011"
      - 5002:5002/udp
