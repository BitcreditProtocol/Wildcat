name: build and push Docker images

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
    PROJECT_ID: "bitcr-shared"
    GAR_LOCATION: "europe-west1"
    REPOSITORY: "bitcr-wildcat-dev"
    GAR_PATH: "europe-west1-docker.pkg.dev/bitcr-shared/bitcr-wildcat-dev"
    BASE_IMAGE_NAME: "wildcat/base-image"
    BASE_IMAGE_CACHE: "europe-west1-docker.pkg.dev/bitcr-shared/bitcr-wildcat-dev/wildcat-base-cache"
    BASE_TAR: "base-image.tar"

jobs:

# ───────────────────────────────
# build base image, cache, upload local artifact
# ───────────────────────────────
  base-image:
    runs-on: ubuntu-latest

    steps:
    - name: Create GitHub App token
      id: app-token
      uses: actions/create-github-app-token@67018539274d69449ef7c02e8e71183d1719ab42 # v2.1.4
      with:
        app-id: ${{ vars.PRIVATE_REPO_ACCESS_APP_ID }}
        private-key: ${{ secrets.PRIVATE_REPO_ACCESS_APP_PRIVATE_KEY }}
        owner: BitcreditProtocol

    - name: Git auth with app token
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

    - name: Authenticate to GCP
      id: auth
      uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
      with:
        workload_identity_provider: ${{ secrets.GCLOUD_WIF_PROVIDER }}
        service_account: ${{ secrets.GCLOUD_SERVICE_ACCOUNT }}
        token_format: access_token

    - name: Auth w/ registry
      uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
      with:
        registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
        username: oauth2accesstoken
        password: ${{ steps.auth.outputs.access_token }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.0

    - name: Build base image (cache + local tar)
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      with:
        context: .
        file: docker/base-image/Dockerfile
        push: false
        platforms: linux/amd64
        tags: ${{ env.BASE_IMAGE_NAME }}
        build-args: |
          CARGO_NET_GIT_FETCH_WITH_CLI=true
        secrets: |
          "gh_token=${{ steps.app-token.outputs.token }}"
        cache-from: |
          type=registry,ref=${{ env.BASE_IMAGE_CACHE }}:buildcache
        cache-to: |
          type=registry,ref=${{ env.BASE_IMAGE_CACHE }}:buildcache,mode=max
        outputs: |
          type=docker,dest=${{ env.BASE_TAR }},name=${{ env.BASE_IMAGE_NAME }}
      
    - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
      with:
        name: base-image
        path: "${{ env.BASE_TAR }}"
        retention-days: 1

# ───────────────────────────────
# build & push wildcat images
# ───────────────────────────────
  wildcat-images:
    needs: base-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: write
    strategy:
      fail-fast: false
      #max-parallel: 1
      matrix:
        service:
          - name: bcr-wdc-key-service
            dockerfile: docker/key-service/Dockerfile
          - name: bcr-wdc-treasury-service
            dockerfile: docker/treasury-service/Dockerfile
          - name: bcr-wdc-swap-service
            dockerfile: docker/swap-service/Dockerfile
          - name: bcr-wdc-quote-service
            dockerfile: docker/quote-service/Dockerfile
          - name: bcr-wdc-wallet-aggregator
            dockerfile: docker/wallet-aggregator/Dockerfile
          - name: bcr-wdc-ebpp
            dockerfile: docker/ebpp/Dockerfile
          - name: bcr-wdc-eiou-service
            dockerfile: docker/eiou-service/Dockerfile
          - name: bcr-wdc-balance-collector
            dockerfile: docker/balance-collector/Dockerfile

    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

    - name: Authenticate to GCP
      id: auth
      uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
      with:
        workload_identity_provider: ${{ secrets.GCLOUD_WIF_PROVIDER }}
        service_account: ${{ secrets.GCLOUD_SERVICE_ACCOUNT }}
        token_format: access_token

    - name: Auth w/ GAR
      uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
      with:
        registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
        username: oauth2accesstoken
        password: ${{ steps.auth.outputs.access_token }}

    - name: Login to GHCR
      uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.0
      with:
        driver: docker

    - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
      with:
        name: base-image
        path: .

    - name: Load base image
      run: docker load -i "${BASE_TAR}"

    - id: meta
      name: Metadata for ${{ matrix.service.name }}
      uses: docker/metadata-action@318604b99e75e41977312d83839a89be02ca4893 # v5.9.0
      with:
        images: |
          ${{ env.GAR_PATH }}/${{ matrix.service.name }}
          ghcr.io/${{ github.repository_owner }}/${{ matrix.service.name }}
        tags: |
          type=semver,pattern={{version}}

    - id: push
      name: Build & push ${{ matrix.service.name }}
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      with:
        context: .
        file: ${{ matrix.service.dockerfile }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}