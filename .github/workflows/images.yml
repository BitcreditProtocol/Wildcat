name: build and push docker images

on:
  schedule:
      - cron: "0 10 * * *"
  push:
    tags:
      - "v*.*.*"


permissions:
  contents: read

env:
  KEY_SERVICE_IMAGE_TAG: "europe-west1-docker.pkg.dev/cs-host-c9f0ca592f814d028135fa/bitcr-devs-repo/bcr-wdc-key-service"
  PROJECT_ID: "cs-host-c9f0ca592f814d028135fa"
  GAR_LOCATION: "europe-west1"
  REPOSITORY: "bitcr-devs-repo"
  GCR_INSTANCE: "bitcr-cloud-run-05"

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v0.6.0

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v5
      with:
        type=schedule, pattern=nightly
        type=semver, pattern={{version}}

    - name: Build Docker Images
      run: just build-docker-images

    - name: Docker auth
      run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

    - name: Build Docker Base Image
      run: docker build -t wildcat/base-image -f docker/base-image/Dockerfile .
    - name: Build Docker Key Service
      run: docker build -t "${{env.KEY_SERVICE_IMAGE_TAG}}:${{steps.meta.outputs.tags}}" -f docker/key-service/Dockerfile .

    - name: Push Key Service image
      run: docker push "${{env.KEY_SERVICE_IMAGE_TAG}}:${{steps.meta.outputs.tags}}"

