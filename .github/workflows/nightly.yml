name: build and push nightly Docker images

on:
  push:
    branches:
      - master

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
    PROJECT_ID: "bitcr-shared"
    GAR_LOCATION: "europe-west1"
    REPOSITORY: "bitcr-wildcat-dev"
    GAR_PATH: "europe-west1-docker.pkg.dev/bitcr-shared/bitcr-wildcat-dev"
    BASE_IMAGE_NAME: "wildcat/base-image"
    BASE_IMAGE_CACHE: "europe-west1-docker.pkg.dev/bitcr-shared/bitcr-wildcat-dev/wildcat-base-cache"
    BASE_TAR: "base-image.tar"

jobs:

# ───────────────────────────────
# detect code changes
# ───────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Detect code changes
      id: filter
      uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
      with:
        base: master
        filters: |
          code:
            - 'crates/**'
            - 'bcr-common/**'
            - 'Cargo.toml'
            - 'Cargo.lock'
            - 'recipe.json'
            - 'docker/**/Dockerfile'
            - '.github/workflows/nightly.yml'

# ───────────────────────────────
# build base image, cache, upload local artifact
# ───────────────────────────────
  base-image:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Create GitHub App token
      id: app-token
      uses: actions/create-github-app-token@67018539274d69449ef7c02e8e71183d1719ab42 # v2.1.4
      with:
        app-id: ${{ vars.PRIVATE_REPO_ACCESS_APP_ID }}
        private-key: ${{ secrets.PRIVATE_REPO_ACCESS_APP_PRIVATE_KEY }}
        owner: BitcreditProtocol

    - name: Git auth with app token
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

    - name: Authenticate to GCP
      id: auth
      uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
      with:
        workload_identity_provider: ${{ secrets.GCLOUD_WIF_PROVIDER }}
        service_account: ${{ secrets.GCLOUD_SERVICE_ACCOUNT }}
        token_format: access_token

    - name: Auth w/ registry
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
      with:
        registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
        username: oauth2accesstoken
        password: ${{ steps.auth.outputs.access_token }}


    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.11.0

    - name: Build base image (remote cache + local tar)
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
      with:
        context: .
        file: docker/base-image/Dockerfile
        push: false
        platforms: linux/amd64
        tags: ${{ env.BASE_IMAGE_NAME }}
        build-args: |
          CARGO_NET_GIT_FETCH_WITH_CLI=true
        secrets: |
          "gh_token=${{ steps.app-token.outputs.token }}"
        cache-from: |
          type=registry,ref=${{ env.BASE_IMAGE_CACHE }}:buildcache
        cache-to: |
          type=registry,ref=${{ env.BASE_IMAGE_CACHE }}:buildcache,mode=max
        outputs: |
          type=docker,dest=${{ env.BASE_TAR }},name=${{ env.BASE_IMAGE_NAME }}

    - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: base-image
        path: "${{ env.BASE_TAR }}"
        retention-days: 1

# ───────────────────────────────
# build & push wildcat images
# ───────────────────────────────
  wildcat-images:
    needs:
      - changes
      - base-image
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: write
    strategy:
      fail-fast: false
      #max-parallel: 1
      matrix:
        service:
          - name: bcr-wdc-core-service
            dockerfile: docker/core-service/Dockerfile
          - name: bcr-wdc-treasury-service
            dockerfile: docker/treasury-service/Dockerfile
          - name: bcr-wdc-quote-service
            dockerfile: docker/quote-service/Dockerfile
          - name: bcr-wdc-wallet-aggregator
            dockerfile: docker/wallet-aggregator/Dockerfile
          - name: bcr-wdc-admin-aggregator
            dockerfile: docker/admin-aggregator/Dockerfile
          - name: bcr-wdc-ebpp
            dockerfile: docker/ebpp/Dockerfile

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Authenticate to GCP
      id: auth
      uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
      with:
        workload_identity_provider: ${{ secrets.GCLOUD_WIF_PROVIDER }}
        service_account: ${{ secrets.GCLOUD_SERVICE_ACCOUNT }}
        token_format: access_token

    - name: Auth w/ GAR
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
      with:
        registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
        username: oauth2accesstoken
        password: ${{ steps.auth.outputs.access_token }}

    - name: Login to GHCR
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.11.0
      with:
        driver: docker

    - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
      with:
        name: base-image
        path: .

    - name: Load base image
      run: docker load -i "${BASE_TAR}"

    - id: meta
      name: Metadata for ${{ matrix.service.name }}
      uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
      with:
        images: |
          ${{ env.GAR_PATH }}/${{ matrix.service.name }}
          ghcr.io/${{ github.repository_owner }}/${{ matrix.service.name }}
        tags: |
          type=raw,value=nightly

    - id: push
      name: Build & push ${{ matrix.service.name }}
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
      with:
        context: .
        file: ${{ matrix.service.dockerfile }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}


  # ─────────────────────────────
  # trigger deployment in deploy repo
  # ─────────────────────────────
  trigger-deploy:
    name: Trigger deploy repo (wildcat-dev)
    environment: wildcat-dev-deployment
    needs:
      - changes
      - wildcat-images
    if: ${{ needs.changes.outputs.code == 'true' && needs.wildcat-images.result == 'success' }}

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref_name }}
      cancel-in-progress: true

    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: deploy-token
        uses: actions/create-github-app-token@67018539274d69449ef7c02e8e71183d1719ab42 # v2.1.4
        with:
          app-id: ${{ vars.WILDCAT_DEPLOYMENT_APP_CLIENT_ID }}
          private-key: ${{ secrets.WILDCAT_DEPLOYMENT_APP_PRIVATE_KEY }}
          owner: BitcreditProtocol
          repositories: Wildcat-deployment

      - name: Dispatch deploy workflow
        env:
          GH_TOKEN: ${{ steps.deploy-token.outputs.token }}
          WILDCAT_IMAGE_TAG: ${{ github.sha }}
        run: |
          gh workflow run deploy.yml \
            --repo BitcreditProtocol/Wildcat-deployment \
            --ref master \
            -f environment=wildcat-dev \
            -f image_tag=nightly
