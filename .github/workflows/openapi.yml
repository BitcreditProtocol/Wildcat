name: build and store openapi.json file

on:
  push:
    branches:
      - dev
      - master

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - stable
    steps:
      - name: Free up disk space
        run: |
          echo "Before cleanup:"
          df -h
          docker system prune -a -f
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo apt-get clean
          sudo apt-get autoremove -y
          echo "After cleanup:"
          df -h

      - name: Create GitHub app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.PRIVATE_REPO_ACCESS_APP_ID }}
          private-key: ${{ secrets.PRIVATE_REPO_ACCESS_APP_PRIVATE_KEY }}
          owner: BitcreditProtocol
      
      - name: Git auth with app token
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: install rust
        run: rustup update stable

      - name: Activate cache
        uses: Swatinem/rust-cache@v2.8.0
        with:
          prefix-key: "wildcat-01"

      - name: get branch name
        id: branch-names
        uses: tj-actions/branch-names@v9

      - name: download previous openapi.json
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          name: "openapi-${{ steps.branch-names.outputs.ref_branch }}.json"

      - name: compile openapi.json
        run: cargo run -p bcr-wdc-admin-aggregator --bin gen_api

      - name: upload new openapi.json file
        uses: actions/upload-artifact@v6
        with:
          name: "openapi-${{ github.refname }}.json"
          path: openapi.json

      - name: compare openapi files
        id: comparison
        uses: swimmwatch/openapi-diff-action@v1.0.1
        with:
          old-spec: "openapi-${{ env.GITHUB_REF }}.json"
          new-spec: openapi.json
          json: out.json
          markdown: out.md

      - name: Get issue content
        id: body
        run: echo "body=$(cat out.md)" >> $GITHUB_OUTPUT

      - name: open an issue in dashboard repo 
        if: steps.comparison.outputs.state != 'no_changes'
        uses: actions-ecosystem/action-create-issue@v1
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          title: "wildcat admin API change in ${{ github.refname }}: ${{ steps.comparison.outputs.state }} changes"
          body: ${{ steps.body.outputs.body }}
          repo: BitcreditProtocol/wildcat-dashboard-ui
