static_resources:
  listeners:
    - name: listener_http
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 4242
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                route_config:
                  name: bff_wallet_routes
                  virtual_hosts:
                    - name: bff_wallet_vhost
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/health"
                          route:
                            cluster: wallet_aggregator

                        - match:
                            prefix: "/v1/mint/quote/credit"
                          route:
                            cluster: quote_service

                        - match:
                            prefix: "/v1/mint/ebill"
                          route:
                            cluster: key_service

                        - match:
                            prefix: "/v1/melt/quote/onchain"
                          route:
                            cluster: treasury_service

                        - match:
                            prefix: "/v1/mint/quote/onchain"
                          route:
                            cluster: treasury_service

                        - match:
                            prefix: "/v1/melt/onchain"
                          route:
                            cluster: treasury_service

                        - match:
                            prefix: "/v1/mint/onchain"
                          route:
                            cluster: treasury_service

                        - match:
                            prefix: "/v1/mint"
                          route:
                            cluster: cdk_mintd

                        - match:
                            prefix: "/v1/melt"
                          route:
                            cluster: cdk_mintd

                        - match:
                            prefix: "/v1/free_money"
                          route:
                            cluster: treasury_service

                        - match:
                            prefix: "/v1/eic"
                          route:
                            cluster: eic_service
                            prefix_rewrite: "/v1"

                        - match:
                            prefix: "/v1/ens/challenge"
                          route:
                            cluster: ens_service
                            prefix_rewrite: "/v1/challenge"

                        - match:
                            prefix: "/v1/ens/email/send"
                          route:
                            cluster: ens_service
                            prefix_rewrite: "/v1/email/send"

                        - match:
                            prefix: "/v1/ens/email/preferences/link"
                          route:
                            cluster: ens_service
                            prefix_rewrite: "/v1/email/preferences/link"

                        - match:
                            prefix: "/email/preferences"
                          route:
                            cluster: ens_service

                        - match:
                            prefix: "/v1"
                          route:
                            cluster: wallet_aggregator
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: wallet_aggregator
      connect_timeout: 2s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: wallet_aggregator
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: wallet-aggregator
                      port_value: 3338

    - name: quote_service
      connect_timeout: 2s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: quote_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: quote-service
                      port_value: 3338

    - name: key_service
      connect_timeout: 2s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: key_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: key-service
                      port_value: 3338

    - name: treasury_service
      connect_timeout: 2s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: treasury_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: treasury-service
                      port_value: 3338

    - name: cdk_mintd
      connect_timeout: 2s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: cdk_mintd
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: cdk-mintd
                      port_value: 8085

    - name: eic_service
      connect_timeout: 2s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: eic_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: eic-service
                      port_value: 3338

    - name: ens_service
      connect_timeout: 2s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: ens_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ens-service
                      port_value: 3339
